<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="gateway-api-key" content="hh4incGSYM2txgPp2ZbGydC1eID3lvXxi6e-aXBR2o4" />
  <title>Carina's Company</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #111827;
      --sidebar:   #0d1117;
      --surface:   #1f2937;
      --border:    #374151;
      --accent:    #60a5fa;
      --accent-dk: #3b82f6;
      --text:      #f9fafb;
      --muted:     #9ca3af;
      --user-bg:   #1d4ed8;
      --user-text: #eff6ff;
      --asst-bg:   #1f2937;
      --err:       #f87171;
      --radius:    10px;
    }

    html, body { height: 100%; height: 100dvh; overflow: hidden; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

    /* ── Layout ───────────────────────────────────────────────────── */
    #shell { display: flex; height: 100vh; height: 100dvh; }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    #sidebar {
      width: 240px; min-width: 200px; max-width: 280px;
      background: var(--sidebar); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 0; overflow-y: auto;
      padding: 16px 14px; gap: 20px;
    }
    #sidebar h1 { font-size: 15px; font-weight: 700; letter-spacing: .4px; color: var(--accent); }

    .sb-section { display: flex; flex-direction: column; gap: 6px; }
    .sb-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); }

    select, input[type=range] { width: 100%; }

    select {
      background: var(--surface); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 8px; font-size: 13px; cursor: pointer;
    }
    select:focus { outline: 2px solid var(--accent); }

    .range-row { display: flex; align-items: center; gap: 8px; }
    input[type=range] { flex: 1; accent-color: var(--accent); }
    #temp-val { font-size: 12px; color: var(--muted); min-width: 24px; text-align: right; }

    textarea#system-prompt {
      width: 100%; height: 72px; resize: vertical;
      background: var(--surface); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 8px; font-size: 12px; font-family: inherit; line-height: 1.5;
    }
    textarea#system-prompt:focus { outline: 2px solid var(--accent); }

    .toggle-row { display: flex; align-items: center; justify-content: space-between; }
    .toggle-label { font-size: 13px; color: var(--muted); }

    /* toggle switch */
    .toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider-sw {
      position: absolute; inset: 0; background: var(--border); border-radius: 20px;
      transition: .2s; cursor: pointer;
    }
    .slider-sw::before {
      content: ""; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px;
      background: var(--text); border-radius: 50%; transition: .2s;
    }
    input:checked + .slider-sw { background: var(--accent-dk); }
    input:checked + .slider-sw::before { transform: translateX(16px); }

    #session-id {
      font-family: monospace; font-size: 11px; color: var(--muted);
      word-break: break-all; line-height: 1.5;
    }

    .btn-sm {
      background: var(--surface); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer;
      transition: background .15s;
    }
    .btn-sm:hover { background: var(--border); }

    /* ── Documents section ──────────────────────────────────────── */
    #upload-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      background: var(--surface); color: var(--text); border: 1px dashed var(--border);
      border-radius: 6px; padding: 7px 10px; font-size: 12px; cursor: pointer;
      transition: border-color .15s, background .15s; text-align: center;
    }
    #upload-btn:hover { border-color: var(--accent); background: #1a2233; }
    #upload-btn.dragover { border-color: var(--accent); background: #1a2233; }
    #file-input { display: none; }

    #upload-status {
      font-size: 11px; color: var(--muted); min-height: 14px;
      display: flex; align-items: center; gap: 6px;
    }
    .spin {
      width: 10px; height: 10px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #doc-list { display: flex; flex-direction: column; gap: 4px; }

    .doc-item {
      display: flex; align-items: center; gap: 7px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 8px;
      font-size: 11px; line-height: 1.4;
    }
    .doc-item input[type=checkbox] { flex-shrink: 0; accent-color: var(--accent); cursor: pointer; }
    .doc-item input[type=checkbox]:disabled { cursor: not-allowed; }
    .doc-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
    .doc-status {
      flex-shrink: 0; font-size: 9px; font-weight: 700; letter-spacing: .4px;
      text-transform: uppercase; padding: 1px 5px; border-radius: 8px;
    }
    .doc-status.pending   { background: #292524; color: #a8a29e; }
    .doc-status.processing { background: #1c1a0e; color: #fbbf24; display: flex; align-items: center; gap: 4px; }
    .doc-status.ready     { background: #052e16; color: #4ade80; }
    .doc-status.failed    { background: #450a0a; color: var(--err); }

    .rag-badge {
      font-size: 10px; padding: 1px 6px; border-radius: 8px;
      background: #1e3a5f; color: var(--accent); border: 1px solid #2563eb;
      margin-left: 4px; flex-shrink: 0;
    }

    /* ── Main ────────────────────────────────────────────────────── */
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    #topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      background: var(--sidebar);
    }
    #topbar-title { font-size: 15px; font-weight: 600; }
    #topbar-right { display: flex; align-items: center; gap: 8px; }
    #status-badge {
      font-size: 11px; padding: 3px 8px; border-radius: 20px;
      background: var(--surface); color: var(--muted); border: 1px solid var(--border);
    }
    #rag-indicator {
      font-size: 11px; padding: 3px 8px; border-radius: 20px;
      background: #1e3a5f; color: var(--accent); border: 1px solid #2563eb;
      display: none;
    }

    /* ── Messages ────────────────────────────────────────────────── */
    #messages {
      flex: 1; overflow-y: auto; padding: 24px 20px;
      display: flex; flex-direction: column; gap: 16px;
    }

    .msg { display: flex; flex-direction: column; gap: 4px; max-width: 80%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }
    .msg.error { align-self: center; align-items: center; max-width: 60%; }

    .bubble {
      padding: 10px 14px; border-radius: var(--radius); line-height: 1.6;
      word-break: break-word; white-space: pre-wrap;
    }
    .msg.user .bubble   { background: var(--user-bg); color: var(--user-text); border-radius: var(--radius) var(--radius) 2px var(--radius); }
    .msg.assistant .bubble { background: var(--asst-bg); border: 1px solid var(--border); border-radius: var(--radius) var(--radius) var(--radius) 2px; }
    .msg.error .bubble  { background: #450a0a; color: var(--err); border: 1px solid #991b1b; border-radius: var(--radius); font-size: 13px; }

    /* markdown inside assistant bubble */
    .bubble p { margin-bottom: .6em; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble code { background: #0d1117; padding: 2px 5px; border-radius: 4px; font-size: 13px; font-family: 'JetBrains Mono', monospace, monospace; }
    .bubble pre { background: #0d1117; border: 1px solid var(--border); border-radius: 6px; padding: 12px; overflow-x: auto; margin: .5em 0; }
    .bubble pre code { background: none; padding: 0; }
    .bubble ul, .bubble ol { padding-left: 1.4em; margin-bottom: .6em; }
    .bubble li { margin-bottom: .2em; }
    .bubble h1, .bubble h2, .bubble h3 { margin: .6em 0 .3em; }
    .bubble a { color: var(--accent); }
    .bubble blockquote { border-left: 3px solid var(--border); padding-left: 10px; color: var(--muted); margin: .5em 0; }
    .bubble table { border-collapse: collapse; margin: .5em 0; }
    .bubble th, .bubble td { border: 1px solid var(--border); padding: 6px 10px; }
    .bubble th { background: var(--surface); }

    .msg-meta {
      font-size: 11px; color: var(--muted);
      display: flex; align-items: center; gap: 8px; padding: 0 4px; flex-wrap: wrap;
    }
    .meta-pill {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 1px 7px; font-size: 10px; color: var(--muted);
    }
    .meta-pill.rag { background: #1e3a5f; border-color: #2563eb; color: var(--accent); }

    /* typing indicator */
    .typing { display: flex; gap: 4px; padding: 10px 14px; align-items: center; }
    .typing span {
      width: 6px; height: 6px; background: var(--muted); border-radius: 50%;
      animation: bounce .9s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(0.6); opacity:.4; } 40% { transform: scale(1); opacity:1; } }

    /* ── Input bar ───────────────────────────────────────────────── */
    #inputbar {
      border-top: 1px solid var(--border); padding: 14px 20px;
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--sidebar);
    }
    #user-input {
      flex: 1; background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; font-size: 14px; font-family: inherit;
      resize: none; min-height: 44px; max-height: 160px; line-height: 1.5;
      overflow-y: auto;
    }
    #user-input:focus { outline: 2px solid var(--accent); }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--accent-dk); color: #fff; border: none;
      border-radius: 8px; padding: 10px 18px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s; white-space: nowrap; height: 44px;
    }
    #send-btn:hover:not(:disabled) { background: var(--accent); }
    #send-btn:disabled { opacity: .45; cursor: not-allowed; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Mobile ──────────────────────────────────────────────────── */
    #menu-btn {
      display: none; background: none; border: none; color: var(--text);
      cursor: pointer; padding: 4px; line-height: 0;
    }

    #sidebar-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 99;
    }
    #sidebar-overlay.open { display: block; }

    @media (max-width: 640px) {
      #menu-btn { display: block; }

      #sidebar {
        position: fixed; top: 0; left: 0; height: 100%; height: 100dvh; z-index: 100;
        transform: translateX(-100%); transition: transform .25s ease;
        width: 280px; max-width: 85vw;
      }
      #sidebar.open { transform: translateX(0); }

      .msg { max-width: 92%; }

      #messages { padding: 16px 12px; }

      #inputbar { padding: 10px 12px; }

      #topbar { padding: 10px 14px; }
    }

    /* ── Auth overlay ────────────────────────────────────────────── */
    #auth-overlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 16px;
    }
    #auth-overlay.hidden { display: none; }

    .auth-card {
      background: var(--sidebar); border: 1px solid var(--border);
      border-radius: 12px; padding: 32px; width: 100%; max-width: 360px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .auth-card h2 { font-size: 18px; font-weight: 700; color: var(--accent); text-align: center; }

    .auth-tabs { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .auth-tab {
      flex: 1; padding: 8px; font-size: 13px; font-weight: 600;
      background: none; border: none; color: var(--muted); cursor: pointer;
      transition: background .15s, color .15s;
    }
    .auth-tab.active { background: var(--surface); color: var(--text); }

    .auth-fields { display: flex; flex-direction: column; gap: 10px; }
    .auth-fields input {
      background: var(--surface); color: var(--text); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; width: 100%;
    }
    .auth-fields input:focus { outline: 2px solid var(--accent); }
    .auth-fields input::placeholder { color: var(--muted); }

    .auth-submit {
      background: var(--accent-dk); color: #fff; border: none;
      border-radius: 8px; padding: 11px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s; width: 100%;
    }
    .auth-submit:hover:not(:disabled) { background: var(--accent); }
    .auth-submit:disabled { opacity: .5; cursor: not-allowed; }

    .auth-error { font-size: 12px; color: var(--err); text-align: center; min-height: 16px; }

    .btn-danger {
      background: #450a0a; color: var(--err); border: 1px solid #991b1b;
      border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer;
      transition: background .15s; width: 100%; text-align: left;
    }
    .btn-danger:hover { background: #7f1d1d; }
  </style>
</head>
<body>

<!-- ── Auth overlay ────────────────────────────────────────────────── -->
<div id="auth-overlay">
  <div class="auth-card">
    <h2>Carina's Company</h2>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login">Login</button>
      <button class="auth-tab" id="tab-register">Register</button>
    </div>
    <div class="auth-fields">
      <input type="text" id="auth-username" placeholder="Username" autocomplete="username" />
      <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password" />
      <input type="email" id="auth-email" placeholder="Email (optional)" autocomplete="email" style="display:none" />
    </div>
    <div class="auth-error" id="auth-error"></div>
    <button class="auth-submit" id="auth-submit">Login</button>
  </div>
</div>

<div id="sidebar-overlay"></div>
<div id="shell">

  <!-- ── Sidebar ─────────────────────────────────────────────────── -->
  <aside id="sidebar">
    <h1>Carina's Company</h1>

    <div class="sb-section">
      <span class="sb-label">Model</span>
      <select id="model-select">
        <optgroup label="Anthropic">
          <option value="claude-opus-4-5">claude-opus-4-5</option>
          <option value="claude-sonnet-4-5-20251001" selected>claude-sonnet-4-5</option>
          <option value="claude-haiku-4-5-20251001">claude-haiku-4-5</option>
        </optgroup>
        <optgroup label="OpenAI">
          <option value="gpt-4o">gpt-4o</option>
          <option value="gpt-4o-mini">gpt-4o-mini</option>
          <option value="o3-mini">o3-mini</option>
        </optgroup>
      </select>
    </div>

    <div class="sb-section">
      <span class="sb-label">Temperature</span>
      <div class="range-row">
        <input type="range" id="temp-slider" min="0" max="1" step="0.05" value="0.7" />
        <span id="temp-val">0.7</span>
      </div>
    </div>

    <div class="sb-section">
      <span class="sb-label">System prompt</span>
      <textarea id="system-prompt" placeholder="Optional system instructions…"></textarea>
    </div>

    <div class="sb-section">
      <span class="sb-label">Options</span>
      <div class="toggle-row">
        <span class="toggle-label">Stream response</span>
        <label class="toggle">
          <input type="checkbox" id="stream-toggle" checked />
          <span class="slider-sw"></span>
        </label>
      </div>
    </div>

    <!-- ── Documents ── -->
    <div class="sb-section">
      <span class="sb-label">Documents (RAG)</span>

      <label id="upload-btn" for="file-input">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Upload PDF
      </label>
      <input type="file" id="file-input" accept=".pdf" />

      <div id="upload-status"></div>
      <div id="doc-list"></div>
    </div>

    <div class="sb-section">
      <span class="sb-label">Session</span>
      <span id="session-id">—</span>
      <button class="btn-sm" id="new-session-btn">New session</button>
    </div>

    <div class="sb-section">
      <span class="sb-label">Account</span>
      <span id="current-username" style="font-size:12px;color:var(--muted)">—</span>
      <button class="btn-danger" id="logout-btn">Logout</button>
    </div>
  </aside>

  <!-- ── Main ────────────────────────────────────────────────────── -->
  <div id="main">
    <div id="topbar">
      <button id="menu-btn" aria-label="Open settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span id="topbar-title">Chat</span>
      <div id="topbar-right">
        <span id="rag-indicator">RAG active</span>
        <span id="status-badge">ready</span>
      </div>
    </div>

    <div id="messages"></div>

    <div id="inputbar">
      <textarea id="user-input" rows="1" placeholder="Message… (Enter to send, Shift+Enter for newline)"></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>

</div>

<script>
  // ── Constants ───────────────────────────────────────────────────
  const GATEWAY_API_KEY = document.querySelector('meta[name="gateway-api-key"]')?.content ?? '';

  // ── Token storage ────────────────────────────────────────────────
  const tokens = {
    get access()  { return localStorage.getItem('access_token'); },
    get refresh() { return localStorage.getItem('refresh_token'); },
    get username(){ return localStorage.getItem('auth_username'); },
    set(access, refresh, username) {
      localStorage.setItem('access_token',  access);
      localStorage.setItem('refresh_token', refresh);
      localStorage.setItem('auth_username', username);
    },
    clear() {
      localStorage.removeItem('access_token');
      localStorage.removeItem('refresh_token');
      localStorage.removeItem('auth_username');
    },
  };

  // ── Authenticated fetch (auto-refresh on 401) ─────────────────────
  async function apiFetch(url, options = {}) {
    const headers = {
      'X-API-Key': GATEWAY_API_KEY,
      ...options.headers,
    };
    if (tokens.access) headers['Authorization'] = `Bearer ${tokens.access}`;

    let resp = await fetch(url, { ...options, headers });

    if (resp.status === 401 && tokens.refresh) {
      // Try to refresh the access token
      const refreshResp = await fetch('/api/v1/auth/refresh', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-API-Key': GATEWAY_API_KEY },
        body: JSON.stringify({ refresh_token: tokens.refresh }),
      });

      if (refreshResp.ok) {
        const data = await refreshResp.json();
        tokens.set(data.access_token, data.refresh_token, tokens.username);
        headers['Authorization'] = `Bearer ${data.access_token}`;
        resp = await fetch(url, { ...options, headers });
      } else {
        // Refresh token expired — force logout
        showAuth();
        return resp;
      }
    }
    return resp;
  }

  // ── Auth overlay ─────────────────────────────────────────────────
  const authOverlay    = document.getElementById('auth-overlay');
  const tabLogin       = document.getElementById('tab-login');
  const tabRegister    = document.getElementById('tab-register');
  const authUsername   = document.getElementById('auth-username');
  const authPassword   = document.getElementById('auth-password');
  const authEmail      = document.getElementById('auth-email');
  const authSubmit     = document.getElementById('auth-submit');
  const authError      = document.getElementById('auth-error');
  const currentUsernameEl = document.getElementById('current-username');

  let authMode = 'login';

  function showAuth() {
    tokens.clear();
    authOverlay.classList.remove('hidden');
    authUsername.value = '';
    authPassword.value = '';
    authEmail.value = '';
    authError.textContent = '';
    currentUsernameEl.textContent = '—';
  }

  function hideAuth(username) {
    authOverlay.classList.add('hidden');
    currentUsernameEl.textContent = username;
  }

  tabLogin.addEventListener('click', () => {
    authMode = 'login';
    tabLogin.classList.add('active');
    tabRegister.classList.remove('active');
    authEmail.style.display = 'none';
    authSubmit.textContent = 'Login';
    authError.textContent = '';
  });

  tabRegister.addEventListener('click', () => {
    authMode = 'register';
    tabRegister.classList.add('active');
    tabLogin.classList.remove('active');
    authEmail.style.display = '';
    authSubmit.textContent = 'Register';
    authError.textContent = '';
  });

  authSubmit.addEventListener('click', handleAuth);
  [authUsername, authPassword, authEmail].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') handleAuth(); });
  });

  async function handleAuth() {
    const username = authUsername.value.trim();
    const password = authPassword.value;
    if (!username || !password) { authError.textContent = 'Username and password required.'; return; }

    authSubmit.disabled = true;
    authError.textContent = '';

    try {
      if (authMode === 'register') {
        const regResp = await fetch('/api/v1/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-API-Key': GATEWAY_API_KEY },
          body: JSON.stringify({ username, password, email: authEmail.value.trim() || undefined }),
        });
        const regData = await regResp.json();
        if (!regResp.ok) { authError.textContent = regData.detail || 'Registration failed.'; return; }
      }

      const loginResp = await fetch('/api/v1/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-API-Key': GATEWAY_API_KEY },
        body: JSON.stringify({ username, password }),
      });
      const loginData = await loginResp.json();
      if (!loginResp.ok) { authError.textContent = loginData.detail || 'Login failed.'; return; }

      tokens.set(loginData.access_token, loginData.refresh_token, username);
      hideAuth(username);

    } catch (err) {
      authError.textContent = err.message;
    } finally {
      authSubmit.disabled = false;
    }
  }

  document.getElementById('logout-btn').addEventListener('click', async () => {
    if (tokens.refresh) {
      await fetch('/api/v1/auth/logout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-API-Key': GATEWAY_API_KEY },
        body: JSON.stringify({ refresh_token: tokens.refresh }),
      }).catch(() => {});
    }
    showAuth();
    messagesEl.innerHTML = '';
    documents.length = 0;
    docList.innerHTML = '';
    newSession();
  });

  // ── Init: check for existing session ─────────────────────────────
  if (tokens.access) {
    hideAuth(tokens.username || '');
  }

  // ── Sidebar drawer (mobile) ──────────────────────────────────────
  const sidebar = document.getElementById('sidebar');
  const sidebarOverlay = document.getElementById('sidebar-overlay');
  document.getElementById('menu-btn').addEventListener('click', () => {
    sidebar.classList.toggle('open');
    sidebarOverlay.classList.toggle('open');
  });
  sidebarOverlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    sidebarOverlay.classList.remove('open');
  });

  // ── Markdown / highlight setup ──────────────────────────────────
  marked.setOptions({ breaks: true, gfm: true });
  const renderer = new marked.Renderer();
  renderer.code = ({ text, lang }) => {
    const language = lang && hljs.getLanguage(lang) ? lang : 'plaintext';
    const highlighted = hljs.highlight(text, { language }).value;
    return `<pre><code class="hljs language-${language}">${highlighted}</code></pre>`;
  };
  marked.use({ renderer });

  // ── State ────────────────────────────────────────────────────────
  let sessionId = localStorage.getItem('llm_session_id') || null;
  let busy = false;

  // documents: [{ id, filename, status, el }]
  const documents = [];
  const pollTimers = {};

  // ── DOM refs ─────────────────────────────────────────────────────
  const messagesEl    = document.getElementById('messages');
  const inputEl       = document.getElementById('user-input');
  const sendBtn       = document.getElementById('send-btn');
  const modelSelect   = document.getElementById('model-select');
  const tempSlider    = document.getElementById('temp-slider');
  const tempVal       = document.getElementById('temp-val');
  const systemPrompt  = document.getElementById('system-prompt');
  const streamToggle  = document.getElementById('stream-toggle');
  const sessionIdEl   = document.getElementById('session-id');
  const statusBadge   = document.getElementById('status-badge');
  const newSessionBtn = document.getElementById('new-session-btn');
  const fileInput     = document.getElementById('file-input');
  const uploadBtn     = document.getElementById('upload-btn');
  const uploadStatus  = document.getElementById('upload-status');
  const docList       = document.getElementById('doc-list');
  const ragIndicator  = document.getElementById('rag-indicator');

  // ── Init ─────────────────────────────────────────────────────────
  updateSessionDisplay();

  // ── Controls ─────────────────────────────────────────────────────
  tempSlider.addEventListener('input', () => { tempVal.textContent = tempSlider.value; });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); trySend(); }
  });

  sendBtn.addEventListener('click', trySend);
  newSessionBtn.addEventListener('click', newSession);

  // ── File upload ──────────────────────────────────────────────────
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) uploadFile(fileInput.files[0]);
    fileInput.value = '';
  });

  uploadBtn.addEventListener('dragover', e => { e.preventDefault(); uploadBtn.classList.add('dragover'); });
  uploadBtn.addEventListener('dragleave', () => uploadBtn.classList.remove('dragover'));
  uploadBtn.addEventListener('drop', e => {
    e.preventDefault();
    uploadBtn.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') uploadFile(file);
    else setUploadStatus('error', 'Only PDF files are supported.');
  });

  async function uploadFile(file) {
    setUploadStatus('busy', `Uploading ${file.name}…`);

    const form = new FormData();
    form.append('file', file);

    try {
      const resp = await apiFetch('/api/v1/rag/documents', {
        method: 'POST',
        body: form,
      });
      const data = await resp.json();

      if (!resp.ok) {
        setUploadStatus('error', data.detail || 'Upload failed');
        return;
      }

      setUploadStatus('ok', 'Uploaded — processing…');
      setTimeout(() => setUploadStatus('', ''), 3000);

      addDocument({ id: data.document_id, filename: data.filename, status: 'pending' });
      pollStatus(data.document_id);

    } catch (err) {
      setUploadStatus('error', err.message);
    }
  }

  function setUploadStatus(type, text) {
    if (!text) { uploadStatus.innerHTML = ''; return; }
    const icon = type === 'busy'  ? '<div class="spin"></div>'
               : type === 'error' ? '⚠️'
               : type === 'ok'    ? '✓'
               : '';
    const color = type === 'error' ? 'var(--err)' : type === 'ok' ? '#4ade80' : 'var(--muted)';
    uploadStatus.innerHTML = `<span style="display:flex;align-items:center;gap:6px;color:${color}">${icon}${escapeHtml(text)}</span>`;
  }

  // ── Document list ────────────────────────────────────────────────
  function addDocument(doc) {
    // Avoid duplicates (e.g. page reload with same session)
    if (documents.find(d => d.id === doc.id)) return;

    const item = document.createElement('div');
    item.className = 'doc-item';
    item.dataset.id = doc.id;

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.disabled = doc.status !== 'ready';
    cb.addEventListener('change', updateRagIndicator);

    const name = document.createElement('span');
    name.className = 'doc-name';
    name.title = doc.filename;
    name.textContent = doc.filename;

    const badge = document.createElement('span');
    badge.className = `doc-status ${doc.status}`;
    badge.textContent = doc.status === 'processing' ? '' : doc.status;
    if (doc.status === 'processing' || doc.status === 'pending') {
      const spin = document.createElement('div');
      spin.className = 'spin';
      badge.appendChild(spin);
      if (doc.status === 'processing') badge.appendChild(document.createTextNode(' proc…'));
    }

    item.appendChild(cb);
    item.appendChild(name);
    item.appendChild(badge);
    docList.appendChild(item);

    const entry = { id: doc.id, filename: doc.filename, status: doc.status, el: item, cb, badge };
    documents.push(entry);
    return entry;
  }

  function updateDocStatus(id, status) {
    const doc = documents.find(d => d.id === id);
    if (!doc) return;
    doc.status = status;
    doc.badge.className = `doc-status ${status}`;
    doc.badge.innerHTML = '';

    if (status === 'ready') {
      doc.badge.textContent = 'ready';
      doc.cb.disabled = false;
      doc.cb.checked = true;  // auto-select when ready
      updateRagIndicator();
    } else if (status === 'failed') {
      doc.badge.textContent = 'failed';
      doc.cb.disabled = true;
    } else {
      const spin = document.createElement('div');
      spin.className = 'spin';
      doc.badge.appendChild(spin);
      doc.badge.appendChild(document.createTextNode(status === 'processing' ? ' proc…' : ''));
    }
  }

  async function pollStatus(id) {
    if (pollTimers[id]) return;

    const tick = async () => {
      try {
        const resp = await apiFetch(`/api/v1/rag/documents/${id}`);
        const data = await resp.json();
        updateDocStatus(id, data.status);

        if (data.status === 'ready' || data.status === 'failed') {
          clearInterval(pollTimers[id]);
          delete pollTimers[id];
        }
      } catch { /* network hiccup, keep polling */ }
    };

    await tick();
    pollTimers[id] = setInterval(tick, 3000);
  }

  function getSelectedDocIds() {
    return documents.filter(d => d.cb.checked && d.status === 'ready').map(d => d.id);
  }

  function updateRagIndicator() {
    const active = getSelectedDocIds().length > 0;
    ragIndicator.style.display = active ? 'block' : 'none';
  }

  // ── Helpers ──────────────────────────────────────────────────────
  function updateSessionDisplay() {
    sessionIdEl.textContent = sessionId ? sessionId.slice(0, 18) + '…' : '—';
  }

  function newSession() {
    sessionId = null;
    localStorage.removeItem('llm_session_id');
    updateSessionDisplay();
    messagesEl.innerHTML = '';
    setStatus('ready');
  }

  function setStatus(text) { statusBadge.textContent = text; }

  function setBusy(val) {
    busy = val;
    sendBtn.disabled = val;
    inputEl.disabled = val;
    setStatus(val ? 'thinking…' : 'ready');
  }

  function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function addUserMessage(content, docIds) {
    const div = document.createElement('div');
    div.className = 'msg user';
    let html = `<div class="bubble">${escapeHtml(content)}</div>`;
    if (docIds && docIds.length) {
      const names = docIds.map(id => {
        const d = documents.find(x => x.id === id);
        return d ? d.filename : id;
      });
      html += `<div class="msg-meta">${names.map(n => `<span class="meta-pill rag">📄 ${escapeHtml(n)}</span>`).join('')}</div>`;
    }
    div.innerHTML = html;
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function addTypingIndicator() {
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.id = 'typing-indicator';
    div.innerHTML = `<div class="bubble typing"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(div);
    scrollToBottom();
    return div;
  }

  function removeTypingIndicator() { document.getElementById('typing-indicator')?.remove(); }

  function addAssistantMessage(content, meta = {}) {
    const div = document.createElement('div');
    div.className = 'msg assistant';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = marked.parse(content);
    div.appendChild(bubble);

    const metaEl = buildMeta(meta);
    if (metaEl) div.appendChild(metaEl);

    messagesEl.appendChild(div);
    scrollToBottom();
    return bubble;
  }

  function buildMeta({ model, provider, inputTokens, outputTokens, ragDocs }) {
    const parts = [];
    if (provider)          parts.push(`<span class="meta-pill">${provider}</span>`);
    if (model)             parts.push(`<span class="meta-pill">${model}</span>`);
    if (inputTokens  != null) parts.push(`<span class="meta-pill">${inputTokens}↑</span>`);
    if (outputTokens != null) parts.push(`<span class="meta-pill">${outputTokens}↓</span>`);
    if (ragDocs && ragDocs.length) parts.push(`<span class="meta-pill rag">RAG · ${ragDocs.length} doc${ragDocs.length > 1 ? 's' : ''}</span>`);
    if (!parts.length) return null;
    const el = document.createElement('div');
    el.className = 'msg-meta';
    el.innerHTML = parts.join('');
    return el;
  }

  function addErrorMessage(text) {
    const div = document.createElement('div');
    div.className = 'msg error';
    div.innerHTML = `<div class="bubble">Error: ${escapeHtml(text)}</div>`;
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function buildRequest(userContent, docIds) {
    const messages = [];
    const sys = systemPrompt.value.trim();
    if (sys) messages.push({ role: 'system', content: sys });
    messages.push({ role: 'user', content: userContent });

    const req = {
      messages,
      config: {
        model: modelSelect.value,
        temperature: parseFloat(tempSlider.value),
        max_tokens: 2048,
      },
      session_id: sessionId || undefined,
    };
    if (docIds && docIds.length) req.document_ids = docIds;
    return req;
  }

  // ── Send ─────────────────────────────────────────────────────────
  function trySend() {
    if (busy) return;
    const content = inputEl.value.trim();
    if (!content) return;
    const docIds = getSelectedDocIds();
    inputEl.value = '';
    inputEl.style.height = 'auto';
    addUserMessage(content, docIds);
    streamToggle.checked ? sendStream(content, docIds) : sendComplete(content, docIds);
  }

  // ── Streaming ────────────────────────────────────────────────────
  async function sendStream(userContent, docIds) {
    setBusy(true);
    addTypingIndicator();
    let bubble = null;
    let fullText = '';

    try {
      const resp = await apiFetch('/api/v1/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(buildRequest(userContent, docIds)),
      });

      if (!resp.ok) {
        removeTypingIndicator();
        const data = await resp.json().catch(() => ({ detail: resp.statusText }));
        addErrorMessage(data.detail || 'Request failed');
        return;
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        let nl;
        while ((nl = buffer.indexOf('\n\n')) !== -1) {
          const block = buffer.slice(0, nl);
          buffer = buffer.slice(nl + 2);

          for (const line of block.split('\n')) {
            if (!line.startsWith('data: ')) continue;
            const raw = line.slice(6).trim();
            if (raw === '[DONE]') break;

            let parsed;
            try { parsed = JSON.parse(raw); } catch { continue; }

            if (parsed.error) { removeTypingIndicator(); addErrorMessage(parsed.error); return; }

            if (parsed.session_id && !sessionId) {
              sessionId = parsed.session_id;
              localStorage.setItem('llm_session_id', sessionId);
              updateSessionDisplay();
            }

            if (parsed.text) {
              fullText += parsed.text;
              if (!bubble) {
                removeTypingIndicator();
                bubble = addAssistantMessage(fullText, { ragDocs: docIds });
              } else {
                bubble.innerHTML = marked.parse(fullText);
                scrollToBottom();
              }
            }
          }
        }
      }

      if (!bubble) removeTypingIndicator();

    } catch (err) {
      removeTypingIndicator();
      addErrorMessage(err.message);
    } finally {
      setBusy(false);
    }
  }

  // ── Non-streaming ─────────────────────────────────────────────────
  async function sendComplete(userContent, docIds) {
    setBusy(true);
    addTypingIndicator();

    try {
      const resp = await apiFetch('/api/v1/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(buildRequest(userContent, docIds)),
      });

      const data = await resp.json();
      removeTypingIndicator();

      if (!resp.ok) { addErrorMessage(data.detail || 'Request failed'); return; }

      if (data.session_id) {
        sessionId = data.session_id;
        localStorage.setItem('llm_session_id', sessionId);
        updateSessionDisplay();
      }

      const r = data.response;
      addAssistantMessage(r.content, {
        model: r.model,
        provider: r.provider,
        inputTokens: r.input_tokens,
        outputTokens: r.output_tokens,
        ragDocs: docIds,
      });

    } catch (err) {
      removeTypingIndicator();
      addErrorMessage(err.message);
    } finally {
      setBusy(false);
    }
  }
</script>
</body>
</html>
